services:
  - type: web
    name: neuroauth-auth
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MAKE_DOC_WEBHOOK
        sync: false
      - key: MAKE_BILLING_WEBHOOK
        sync: false
